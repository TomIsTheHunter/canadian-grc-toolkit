name: GRC Policy CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  opa-lint:
    name: OPA Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install OPA
        run: |
          curl -L -o opa https://openpolicyagent.org/downloads/latest/opa_linux_amd64_static
          chmod +x opa
          sudo mv opa /usr/local/bin/opa
          opa version

      - name: Lint OPA policies
        run: |
          opa fmt --diff policies/

      - name: Run OPA tests
        run: |
          opa test policies/ -v

  python-smoke-tests:
    name: Python Smoke Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r scripts/requirements.txt

      - name: Run smoke tests
        run: |
          python -m pytest scripts/tests/ -v --tb=short

        - name: Validate risk register CLI — template generation
          run: |
            python -m scripts.risk_register --template --output-json reports/risk_register_template.json
            python -c "import json; d=json.load(open('reports/risk_register_template.json')); assert 'risks' in d, 'template missing risks key'"

        - name: Validate risk register CLI — sample register processing
          run: |
            python -m scripts.risk_register \
              --input scripts/sample_risk_register.json \
              --output-json reports/risk_register_output.json \
              --output-md reports/risk_register_report.md
            python -c "
            import json
            d = json.load(open('reports/risk_register_output.json'))
            assert all('rag_status' in r for r in d['risks']), 'missing rag_status'
            assert all('score' in r['residual_risk'] for r in d['risks']), 'missing residual score'
            assert all(r['rag_status'] in ('Red','Amber','Green') for r in d['risks']), 'invalid RAG'
            print(f'[✓] {len(d[\"risks\"])} risks validated in output JSON')
            "